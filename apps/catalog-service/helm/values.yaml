replicaCount: 2

image:
  repository: ghcr.io/saudi-fabric/catalog-service
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

env:
  APP_ENV: production
  PORT: "8080"
  DB_HOST: postgres-catalog
  DB_PORT: "5432"
  DB_USER: catalog_user
  DB_NAME: catalog_db
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317

envFromSecrets:
  DB_PASSWORD:
    secretName: catalog-service-db
    key: password

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
