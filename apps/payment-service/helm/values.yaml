replicaCount: 2

image:
  repository: ghcr.io/saudi-fabric/payment-service
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  PORT: "8080"
  DB_HOST: postgres-payment
  DB_PORT: "5432"
  DB_USER: payment_user
  DB_NAME: payment_db
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317

envFromSecrets:
  DB_PASSWORD:
    secretName: payment-service-db
    key: password

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
