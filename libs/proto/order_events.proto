syntax = "proto3";

package fabric.events;

option go_package = "github.com/saudi-fabric/events;events";

import "google/protobuf/timestamp.proto";

message OrderCreated {
  string order_id = 1;
  string customer_id = 2;
  string correlation_id = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated OrderItem items = 5;
  string currency = 6; // "SAR"
  double total_amount = 7;
}

message OrderItem {
  string product_id = 1;
  string sku = 2;
  int32 quantity = 3;
  double unit_price = 4;
}

message OrderPaymentRequested {
  string order_id = 1;
  string payment_id = 2;
  string correlation_id = 3;
  double amount = 4;
  string currency = 5;
  string payment_method = 6; // "MADA", "STC_PAY", "APPLE_PAY"
}

message OrderPaymentConfirmed {
  string order_id = 1;
  string payment_id = 2;
  string correlation_id = 3;
  google.protobuf.Timestamp confirmed_at = 4;
}

message OrderPaymentFailed {
  string order_id = 1;
  string payment_id = 2;
  string correlation_id = 3;
  string reason = 4;
}

message OrderInventoryReserved {
  string order_id = 1;
  string correlation_id = 2;
  google.protobuf.Timestamp reserved_at = 3;
}

message OrderInventoryReservationFailed {
  string order_id = 1;
  string correlation_id = 2;
  string reason = 3;
}

message OrderCompleted {
  string order_id = 1;
  string correlation_id = 2;
  google.protobuf.Timestamp completed_at = 3;
}

message OrderCancelled {
  string order_id = 1;
  string correlation_id = 2;
  string reason = 3;
  google.protobuf.Timestamp cancelled_at = 4;
}
